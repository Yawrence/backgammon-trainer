<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Backgammon Trainer</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="trainer">

    <h1>🎲 Backgammon Trainer</h1>

    <div id="filterBar">

        <button id="allButton">🎲 Alle</button>

        <button id="oliButton">👤 Oli</button>

        <button id="bdButton">👤 BD</button>

    </div>

    <div id="progress">

        <div id="progressText">
            Position 1 / 10
        </div>

        <div id="progressBar">
            <div id="progressFill"></div>
        </div>

    </div>

    <div id="board">

        <h2>Was würdest Du spielen?</h2>

        <p id="positionText">
            Position wird geladen ...
        </p>

    </div>

    <button id="revealButton">
        🧠 Auflösung zeigen
    </button>

    <div id="solution" class="hidden"></div>

</div>

<script src="app.js"></script>

</body>
</html>
